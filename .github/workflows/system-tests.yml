name: System Tests

on:
  push:
    branches:
      - master
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  rspec_system:
    name: RSpec (spec/system)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: discourse
          POSTGRES_PASSWORD: discourse
          POSTGRES_DB: discourse_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGUSER: discourse
      PGPASSWORD: discourse
      DISCOURSE_DEV_DB: discourse_test
      LOAD_PLUGINS: 1
      DISCOURSE_REDIS_URL: redis://127.0.0.1:6379
      REDIS_URL: redis://127.0.0.1:6379
      DISCOURSE_DB_HOST: 127.0.0.1
      DISCOURSE_DB_USERNAME: discourse
      DISCOURSE_DB_PASSWORD: discourse
      CAPYBARA_DEFAULT_MAX_WAIT_TIME: 10

    steps:
      - name: Checkout Discourse
        uses: actions/checkout@v4
        with:
          repository: discourse/discourse
          path: discourse

      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: discourse/plugins/discourse-translator

      - name: Set up Ruby 3.4
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: false

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libpq-dev libssl-dev imagemagick

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
          install-chromedriver: true

      - name: Start Redis
        run: |
          sudo apt-get install -y redis-server
          sudo service redis-server start
          redis-cli ping

      - name: Set up Node and pnpm
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install JS dependencies
        working-directory: discourse
        run: pnpm install

      - name: Bundle install
        working-directory: discourse
        run: bundle install --jobs 4 --retry 3

      - name: Set up database
        working-directory: discourse
        run: bundle exec rake db:create db:migrate

      - name: Build frontend assets
        working-directory: discourse
        run: bin/ember-cli --build

      - name: Run system specs
        working-directory: discourse
        run: |
          bundle exec rspec \
            plugins/discourse-translator/spec/system \
            --format documentation

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: system-test-screenshots
          path: discourse/tmp/capybara/
          if-no-files-found: ignore
          retention-days: 7
