name: Playwright Screenshots

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: discourse
          POSTGRES_PASSWORD: discourse
          POSTGRES_DB: discourse_development
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: development
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGUSER: discourse
      PGPASSWORD: discourse
      LOAD_PLUGINS: 1
      DISCOURSE_DEV_DB: discourse_development
      DISCOURSE_REDIS_URL: redis://127.0.0.1:6379
      REDIS_URL: redis://127.0.0.1:6379
      DISCOURSE_DB_HOST: 127.0.0.1
      DISCOURSE_DB_USERNAME: discourse
      DISCOURSE_DB_PASSWORD: discourse
      DISCOURSE_ADMIN_USER: pwadmin
      DISCOURSE_ADMIN_PASS: playwright-pass-123
      DISCOURSE_URL: http://localhost:4200

    steps:
      - name: Checkout Discourse
        uses: actions/checkout@v4
        with:
          repository: discourse/discourse
          path: discourse

      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: discourse/plugins/discourse-translator

      - name: Set up Ruby 3.4
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: false

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libpq-dev libssl-dev imagemagick

      - name: Start Redis
        run: |
          sudo apt-get install -y redis-server
          sudo service redis-server start
          redis-cli ping

      - name: Set up Node and pnpm
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install JS dependencies
        working-directory: discourse
        run: pnpm install

      - name: Bundle install
        working-directory: discourse
        run: bundle install --jobs 4 --retry 3

      - name: Set up database
        working-directory: discourse
        run: bundle exec rake db:create db:migrate

      - name: Seed sample content and admin user
        working-directory: discourse
        run: |
          bundle exec rake dev:populate || true
          bundle exec rails runner "
            u = User.find_or_initialize_by(username: ENV['DISCOURSE_ADMIN_USER'])
            u.email = 'pwadmin@example.com'
            u.password = ENV['DISCOURSE_ADMIN_PASS']
            u.active = true
            u.approved = true
            u.save!
            u.activate
            u.grant_admin!
            u.email_tokens.update_all(confirmed: true)
          "

      - name: Start Rails server
        working-directory: discourse
        run: |
          bundle exec rails server -b 0.0.0.0 -p 3000 > rails.log 2>&1 &
          for i in $(seq 1 60); do
            curl -sf http://localhost:3000/srv/status && break
            sleep 5
          done

      - name: Start Ember CLI
        working-directory: discourse
        run: |
          bin/ember-cli > ember.log 2>&1 &
          for i in $(seq 1 60); do
            curl -sf http://localhost:4200/srv/status && break
            sleep 5
          done

      - name: Install Playwright
        working-directory: discourse/plugins/discourse-translator/playwright
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Run Playwright screenshots
        working-directory: discourse/plugins/discourse-translator/playwright
        run: npx playwright test

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: discourse/plugins/discourse-translator/playwright/screenshots/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: discourse/plugins/discourse-translator/playwright/playwright-report/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload server logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-logs
          path: |
            discourse/rails.log
            discourse/ember.log
          if-no-files-found: ignore
          retention-days: 7
